<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' ipc.localhost; connect-src 'self' ipc.localhost http://localhost:* ws://localhost:* ws://127.0.0.1:*; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" />
    <title>桌面收纳</title>
    <style>
      /* 防止白屏和闪烁的关键CSS */
      html, body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* 初始隐藏，防止闪烁 */
      #root {
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.15s ease-out;
      }
      
      /* 应用加载完成后显示 */
      #root.loaded {
        opacity: 1;
      }
      
      /* 防止选中时背景高亮 */
      * {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* 拖拽区域优化 */
      [data-tauri-drag-region] {
        cursor: grab;
        -webkit-app-region: drag;
      }
      
      [data-tauri-drag-region]:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
