<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>菜单</title>
    <style>
      html, body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: transparent;
      }
      
      #root {
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.2s ease-out;
      }
      
      #root.loaded {
        opacity: 1;
      }
      
      * {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/box-float/menu-float-main.tsx"></script>
</body>
</html>
