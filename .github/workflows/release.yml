name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.2.3)'
        required: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  RUST_VERSION: '1.95.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust Toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          default: true
          override: true
          target: x86_64-pc-windows-msvc

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Dependencies
        run: npm ci

      - name: Build Tauri App
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Generate Signature
        if: startsWith(github.ref, 'refs/tags/v')
        id: signature
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $nsisDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $files = Get-ChildItem -Path $nsisDir -Filter "*.exe" | Where-Object { $_.Name -notmatch "WebView2" }

          if ($files) {
            $installerFile = $files | Select-Object -First 1
            Write-Host "Signing: $($installerFile.FullName)"

            # Set environment variables for tauri signer
            $env:TAURI_SIGNING_PRIVATE_KEY = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"

            # Sign the installer
            $signature = npx tauri signer sign $installerFile.FullName 2>&1

            # Extract signature from output (format: "Signature: <base64>")
            $signatureLine = $signature | Where-Object { $_ -match "^Signature:\s*" }
            if ($signatureLine) {
              $sig = ($signatureLine -replace "^Signature:\s*", "").Trim()
              Write-Host "signature=$sig" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Host "Signature extracted successfully"
            } else {
              Write-Host "Full output: $signature"
              throw "Failed to extract signature from output"
            }
          } else {
            Write-Host "No NSIS installer found"
          }

      - name: Create latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Get version from tag
          $tag = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $version = $tag.Trim()
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Get signature from previous step output
          $signature = "${{ steps.signature.outputs.signature }}"

          # Find installer files
          $nsisDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $nsisFile = Get-ChildItem -Path $nsisDir -Filter "*.exe" | Where-Object { $_.Name -notmatch "WebView2" } | Select-Object -First 1

          if (-not $nsisFile) {
            throw "No NSIS installer found"
          }

          # Build download URL
          $downloadUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/v${version}/$($nsisFile.Name)"

          # Create latest.json
          $latestJson = @"
          {
            "version": "${version}",
            "notes": "版本 ${version} 更新",
            "pub_date": "${date}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${signature}",
                "url": "${downloadUrl}"
              }
            }
          }
"@
          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "latest.json created for version ${version}"
          Get-Content "latest.json"

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**
            latest.json
            !src-tauri/target/x86_64-pc-windows-msvc/release/build/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display Structure
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
