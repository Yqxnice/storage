<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收纳盒悬浮窗</title>
    <style>
      html, body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
      }
      
      #root {
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.15s ease-out;
      }
      
      #root.loaded {
        opacity: 1;
      }
      
      * {
        -webkit-user-select: none;
        user-select: none;
      }
      
      [data-tauri-drag-region] {
        cursor: grab;
        -webkit-app-region: drag;
      }
      
      [data-tauri-drag-region]:active {
        cursor: grabbing;
      }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/box-float/main.tsx"></script>
</body>
</html>
